name: CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: bun run build

      - name: Test web
        working-directory: web
        run: bun test

      - name: Test Rust core crates
        timeout-minutes: 20
        run: |
          cargo test \
            -p mobilecode_connect_protocol \
            -p mobilecode_connect_auth \
            -p mobilecode_connect_control_client \
            -p mobilecode_connect_punch

      - name: Test Rust networking crates
        timeout-minutes: 20
        run: |
          cargo test \
            -p mobilecode_connect_tunnel \
            -p mobilecode_connect_agent

      - name: Test Rust control crate
        timeout-minutes: 20
        run: cargo test -p mobilecode_connect_control

      - name: Test Rust mobile and SDK crates
        timeout-minutes: 20
        run: |
          cargo test \
            -p mobilecode_connect_relay \
            -p mobilecode_connect_mobile_core \
            -p mobilecode_connect_sdk

      - name: Test Rust app crates
        timeout-minutes: 15
        run: |
          cargo test \
            -p agentd \
            -p mobile-cli \
            -p relayd \
            -p control-server \
            -p punch-server

      - name: Validate mobile packaging scripts
        run: |
          bash -n scripts/package-mobile-ios.sh
          bash -n scripts/package-mobile-android.sh
          scripts/package-mobile-ios.sh \
            --dry-run \
            --targets aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios \
            --xcframework-output target/mobile-package-dry-run/ios/mobilecode_connect_mobile_coreFFI.xcframework
          scripts/package-mobile-android.sh \
            --dry-run \
            --gradle-task assembleRelease \
            --aar-output-dir target/mobile-package-dry-run/android/aar

  release-binaries:
    name: Release binaries (${{ matrix.target }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build web
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build musl binaries
        run: cross build --release --target ${{ matrix.target }} -p control-server -p relayd

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          for bin in control-server relayd; do
            artifact="${bin}-${{ matrix.target }}"
            mkdir -p "dist/${artifact}"
            cp "target/${{ matrix.target }}/release/${bin}" "dist/${artifact}/${bin}"
            tar -czf "dist/${artifact}.tar.gz" -C "dist/${artifact}" "${bin}"
          done

          cd dist
          sha256sum *.tar.gz > "sha256sums-${{ matrix.target }}.txt"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/sha256sums-${{ matrix.target }}.txt

  mobile-android:
    name: Android mobile package
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 27.2.12479018
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: mobile-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platforms;android-37" \
            "build-tools;37.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install UniFFI bindgen
        run: cargo install uniffi --version 0.31.1 --features cli --locked

      - name: Build Android AAR
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          scripts/package-mobile-android.sh \
            --gradle-task assembleRelease \
            --aar-output-dir target/mobile-package/android/aar

      - name: Package Android artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          aars=(target/mobile-package/android/aar/*.aar)
          shopt -u nullglob
          if [[ "${#aars[@]}" -ne 1 ]]; then
            echo "expected exactly one Android AAR, found ${#aars[@]}" >&2
            exit 1
          fi
          cp "${aars[0]}" dist/mobilecode-connect-mobile-android.aar
          cp target/mobile-package/android/mobile-package-manifest.json \
            dist/mobilecode-connect-mobile-android-manifest.json
          cd dist
          sha256sum \
            mobilecode-connect-mobile-android.aar \
            mobilecode-connect-mobile-android-manifest.json \
            > sha256sums-mobile-android.txt

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mobile-android
          path: dist/*

  mobile-ios:
    name: iOS mobile package
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: mobile-ios

      - name: Install Rust iOS targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Install UniFFI bindgen
        run: cargo install uniffi --version 0.31.1 --features cli --locked

      - name: Build iOS XCFramework
        run: |
          scripts/package-mobile-ios.sh \
            --targets aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios \
            --xcframework-output target/mobile-package/ios/mobilecode_connect_mobile_coreFFI.xcframework

      - name: Package iOS artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --keepParent \
            target/mobile-package/ios/mobilecode_connect_mobile_coreFFI.xcframework \
            dist/mobilecode-connect-mobile-ios-xcframework.zip
          cp target/mobile-package/ios/mobile-package-manifest.json \
            dist/mobilecode-connect-mobile-ios-manifest.json
          cd dist
          shasum -a 256 \
            mobilecode-connect-mobile-ios-xcframework.zip \
            mobilecode-connect-mobile-ios-manifest.json \
            > sha256sums-mobile-ios.txt

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mobile-ios
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    needs:
      - release-binaries
      - mobile-android
      - mobile-ios
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Merge checksums
        run: |
          set -euo pipefail
          cd dist
          cat sha256sums-*.txt | sort > sha256sums.txt
          rm sha256sums-*.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  docker:
    name: Docker images
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: control-server
            dockerfile: docker/control-server.Dockerfile
            image_name: ghcr.io/yuworm/mobile-code-connect/control-server
          - image: relayd
            dockerfile: docker/relayd.Dockerfile
            image_name: ghcr.io/yuworm/mobile-code-connect/relayd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
