name: CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: bun run build

      - name: Test web
        working-directory: web
        run: bun test

      - name: Test Rust workspace
        run: cargo test --workspace

  release-binaries:
    name: Release binaries (${{ matrix.target }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build web
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build musl binaries
        run: cross build --release --target ${{ matrix.target }} -p control-server -p relayd

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          for bin in control-server relayd; do
            artifact="${bin}-${{ matrix.target }}"
            mkdir -p "dist/${artifact}"
            cp "target/${{ matrix.target }}/release/${bin}" "dist/${artifact}/${bin}"
            tar -czf "dist/${artifact}.tar.gz" -C "dist/${artifact}" "${bin}"
          done

          cd dist
          sha256sum *.tar.gz > "sha256sums-${{ matrix.target }}.txt"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/sha256sums-${{ matrix.target }}.txt

  publish-release:
    name: Publish GitHub Release
    needs: release-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Merge checksums
        run: |
          set -euo pipefail
          cd dist
          cat sha256sums-*.txt | sort > sha256sums.txt
          rm sha256sums-*.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  docker:
    name: Docker images
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: control-server
            dockerfile: docker/control-server.Dockerfile
            image_name: ghcr.io/yuworm/mobile-code-connect/control-server
          - image: relayd
            dockerfile: docker/relayd.Dockerfile
            image_name: ghcr.io/yuworm/mobile-code-connect/relayd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
